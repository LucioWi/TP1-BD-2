<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../dist/output.css">
  <title>Nuevo Producto</title>
</head>

<body class="bg-gray-100">

  <header class="p-6 bg-white shadow">
    <h1 class="tracking-[0.3em] text-sm">MAISON DE LUXE</h1>
  </header>

  <div class="max-w-3xl mx-auto mt-10 bg-white p-10 shadow">

    <a href="home.html" class="text-sm text-gray-500 mb-6 inline-block">
      ← Volver
    </a>

    <h2 class="text-2xl mb-8">Nueva Creación</h2>

    <form class="space-y-6" id="formProducto">

      <!-- DATOS BÁSICOS -->
      <div>
        <label class="text-xs text-gray-400">Nombre *</label>
        <input id="nombre" class="w-full border p-3 mt-1" placeholder="Nombre del producto" required>
      </div>

      <div>
        <label class="text-xs text-gray-400">Marca *</label>
        <input id="marca" class="w-full border p-3 mt-1" placeholder="Ej: Cartier, Rolex..." required>
      </div>

      <div>
        <label class="text-xs text-gray-400">Categoría *</label>
        <select id="categoria" class="w-full border p-3 mt-1" required onchange="actualizarCampos()">
          <option value="">Seleccionar categoría...</option>
          <option value="reloj">Reloj</option>
          <option value="anillo">Anillo</option>
          <option value="pendientes">Pendientes</option>
          <option value="cadena">Cadena</option>
          <option value="brazalete">Brazalete</option>
        </select>
      </div>

      <div>
        <label class="text-xs text-gray-400">Descripción</label>
        <textarea id="descripcion" class="w-full border p-3 mt-1 h-24" placeholder="Descripción del producto"></textarea>
      </div>

      <div>
        <label class="text-xs text-gray-400">Precio *</label>
        <input id="precio" type="number" class="w-full border p-3 mt-1" placeholder="0.00" required>
      </div>

      <div>
        <label class="text-xs text-gray-400">Imagen URL</label>
        <input id="imagen" class="w-full border p-3 mt-1" placeholder="https://...">
      </div>

      <!-- CAMPOS DINÁMICOS SEGÚN CATEGORÍA -->
      <div id="camposDinamicos" class="space-y-4 border-t pt-6">
        <h3 class="font-semibold text-gray-700">Especificaciones</h3>
        
        <!-- PARA RELOJES -->
        <div id="camposReloj" class="hidden space-y-3">
          <div>
            <label class="text-xs text-gray-400">Tipo de Reloj</label>
            <input id="tipoReloj" class="w-full border p-3 mt-1" placeholder="ej: automático, cuarzo">
          </div>
          <div>
            <label class="text-xs text-gray-400">Diámetro (mm)</label>
            <input id="diametroReloj" type="number" class="w-full border p-3 mt-1" placeholder="36-42">
          </div>
          <div>
            <label class="text-xs text-gray-400">Material de Caja</label>
            <input id="materialCaja" class="w-full border p-3 mt-1" placeholder="ej: acero inoxidable, oro">
          </div>
          <div>
            <label class="text-xs text-gray-400">Calibre</label>
            <input id="calibreReloj" class="w-full border p-3 mt-1" placeholder="ej: 3235">
          </div>
          <div>
            <label class="text-xs text-gray-400">Resistencia al agua (m)</label>
            <input id="resistenciaAgua" type="number" class="w-full border p-3 mt-1" placeholder="100">
          </div>
        </div>

        <!-- PARA ANILLOS -->
        <div id="camposAnillo" class="hidden space-y-3">
          <div>
            <label class="text-xs text-gray-400">Tipo de Anillo</label>
            <input id="tipoAnillo" class="w-full border p-3 mt-1" placeholder="ej: solitario, eternidad">
          </div>
          <div>
            <label class="text-xs text-gray-400">Metal</label>
            <input id="metalAnillo" class="w-full border p-3 mt-1" placeholder="ej: oro 18k, plata 925">
          </div>
          <div>
            <label class="text-xs text-gray-400">¿Tiene piedra?</label>
            <select id="tienePiedra" class="w-full border p-3 mt-1">
              <option value="false">No</option>
              <option value="true">Sí</option>
            </select>
          </div>
          <div>
            <label class="text-xs text-gray-400">Tipo de Piedra (si aplica)</label>
            <input id="tipoPiedra" class="w-full border p-3 mt-1" placeholder="ej: diamante, zafiro">
          </div>
          <div>
            <label class="text-xs text-gray-400">Quilates</label>
            <input id="quilatesAnillo" type="number" step="0.01" class="w-full border p-3 mt-1" placeholder="1.5">
          </div>
        </div>

        <!-- PARA PENDIENTES -->
        <div id="camposPendientes" class="hidden space-y-3">
          <div>
            <label class="text-xs text-gray-400">Tipo de Pendiente</label>
            <input id="tipoPendiente" class="w-full border p-3 mt-1" placeholder="ej: aretes, colgantes">
          </div>
          <div>
            <label class="text-xs text-gray-400">Material</label>
            <input id="materialPendiente" class="w-full border p-3 mt-1" placeholder="ej: plata, oro 18k">
          </div>
          <div>
            <label class="text-xs text-gray-400">¿Tiene piedra?</label>
            <select id="tienePiedraPendiente" class="w-full border p-3 mt-1">
              <option value="false">No</option>
              <option value="true">Sí</option>
            </select>
          </div>
        </div>

        <!-- PARA CADENAS -->
        <div id="camposCadena" class="hidden space-y-3">
          <div>
            <label class="text-xs text-gray-400">Tipo de Cadena</label>
            <input id="tipoCadena" class="w-full border p-3 mt-1" placeholder="ej: cubana, rope, fina">
          </div>
          <div>
            <label class="text-xs text-gray-400">Material</label>
            <input id="materialCadena" class="w-full border p-3 mt-1" placeholder="ej: oro 18k, plata 925">
          </div>
          <div>
            <label class="text-xs text-gray-400">Largo (cm)</label>
            <input id="largoCadena" type="number" class="w-full border p-3 mt-1" placeholder="50">
          </div>
          <div>
            <label class="text-xs text-gray-400">Grosor (mm)</label>
            <input id="grosorCadena" type="number" step="0.5" class="w-full border p-3 mt-1" placeholder="3.5">
          </div>
        </div>

        <!-- PARA BRAZALETES -->
        <div id="camposBrazalete" class="hidden space-y-3">
          <div>
            <label class="text-xs text-gray-400">Tipo de Brazalete</label>
            <input id="tipoBrazalete" class="w-full border p-3 mt-1" placeholder="ej: elástico, rígido">
          </div>
          <div>
            <label class="text-xs text-gray-400">Material</label>
            <input id="materialBrazalete" class="w-full border p-3 mt-1" placeholder="ej: perlas, plata">
          </div>
          <div>
            <label class="text-xs text-gray-400">Circuferencia (cm)</label>
            <input id="circBrazalete" type="text" class="w-full border p-3 mt-1" placeholder="18-20cm">
          </div>
          <div>
            <label class="text-xs text-gray-400">Peso aproximado (g)</label>
            <input id="pesoBrazalete" type="number" step="0.1" class="w-full border p-3 mt-1" placeholder="45">
          </div>
        </div>
      </div>

      <!-- VARIANTES -->
      <div class="border-t pt-6">
        <h3 class="font-semibold text-gray-700 mb-3">Variantes del Producto</h3>
        <div id="variantes" class="space-y-3">
          <div class="border p-3 rounded variante-row">
            <input class="w-full border p-2 mb-2 variante-descripcion" placeholder="Descripción de variante (ej: color dorado)">
            <input class="w-full border p-2 mb-2 variante-stock" type="number" placeholder="Stock disponible">
            <input class="w-full border p-2 mb-2 variante-precio" type="number" placeholder="Precio de variante">
            <input class="w-full border p-2 variante-imagen" placeholder="URL de imagen de variante">
          </div>
        </div>
        <button type="button" onclick="agregarVariante()" class="text-blue-600 text-sm mt-2">+ Agregar variante</button>
      </div>

      <div class="flex gap-4 mt-6">
        <button type="submit" class="bg-black text-white px-6 py-3">
          Crear Producto
        </button>
        <a href="home.html" class="border px-6 py-3">
          Cancelar
        </a>
      </div>

    </form>

  </div>

  <script>
    function actualizarCampos() {
      const categoria = document.getElementById('categoria').value;
      const secciones = ['camposReloj', 'camposAnillo', 'camposPendientes', 'camposCadena', 'camposBrazalete'];
      secciones.forEach(id => document.getElementById(id).classList.add('hidden'));

      if (categoria === 'reloj') document.getElementById('camposReloj').classList.remove('hidden');
      if (categoria === 'anillo') document.getElementById('camposAnillo').classList.remove('hidden');
      if (categoria === 'pendientes') document.getElementById('camposPendientes').classList.remove('hidden');
      if (categoria === 'cadena') document.getElementById('camposCadena').classList.remove('hidden');
      if (categoria === 'brazalete') document.getElementById('camposBrazalete').classList.remove('hidden');
    }

    function agregarVariante() {
      const html = `
        <div class="border p-3 rounded variante-row">
          <input class="w-full border p-2 mb-2 variante-descripcion" placeholder="Descripción de variante (ej: color dorado)">
          <input class="w-full border p-2 mb-2 variante-stock" type="number" placeholder="Stock disponible">
          <input class="w-full border p-2 mb-2 variante-precio" type="number" placeholder="Precio de variante">
          <input class="w-full border p-2 variante-imagen" placeholder="URL de imagen de variante">
          <button type="button" onclick="this.parentElement.remove()" class="text-red-600 text-xs mt-2">Eliminar</button>
        </div>
      `;
      document.getElementById('variantes').innerHTML += html;
    }

    function obtenerEspecificaciones(categoria) {
      if (categoria === 'reloj') {
        return {
          tipoReloj: document.getElementById('tipoReloj')?.value || '',
          diametroMm: parseInt(document.getElementById('diametroReloj')?.value) || 0,
          materialCaja: document.getElementById('materialCaja')?.value || '',
          calibre: document.getElementById('calibreReloj')?.value || '',
          resistenciaAguaM: parseInt(document.getElementById('resistenciaAgua')?.value) || 0
        };
      }
      if (categoria === 'anillo') {
        return {
          tipoAnillo: document.getElementById('tipoAnillo')?.value || '',
          metal: document.getElementById('metalAnillo')?.value || '',
          tienePiedra: document.getElementById('tienePiedra')?.value === 'true',
          tipoPiedra: document.getElementById('tipoPiedra')?.value || '',
          quilates: parseFloat(document.getElementById('quilatesAnillo')?.value) || 0
        };
      }
      if (categoria === 'pendientes') {
        return {
          tipoPendiente: document.getElementById('tipoPendiente')?.value || '',
          material: document.getElementById('materialPendiente')?.value || '',
          tienePiedra: document.getElementById('tienePiedraPendiente')?.value === 'true'
        };
      }
      if (categoria === 'cadena') {
        return {
          tipoCadena: document.getElementById('tipoCadena')?.value || '',
          material: document.getElementById('materialCadena')?.value || '',
          largoCm: parseInt(document.getElementById('largoCadena')?.value) || 0,
          grosorMm: parseFloat(document.getElementById('grosorCadena')?.value) || 0
        };
      }
      if (categoria === 'brazalete') {
        return {
          tipoBrazalete: document.getElementById('tipoBrazalete')?.value || '',
          material: document.getElementById('materialBrazalete')?.value || '',
          circunferencia: document.getElementById('circBrazalete')?.value || '',
          pesoG: parseFloat(document.getElementById('pesoBrazalete')?.value) || 0
        };
      }
      return {};
    }

    function obtenerVariantesDesdeFormulario() {
      return Array.from(document.querySelectorAll('.variante-row')).map((row, index) => {
        const descripcion = row.querySelector('.variante-descripcion')?.value || `Variante ${index + 1}`;
        const stock = parseInt(row.querySelector('.variante-stock')?.value) || 0;
        const precioVariante = parseInt(row.querySelector('.variante-precio')?.value) || parseInt(document.getElementById('precio').value);
        const imagen = row.querySelector('.variante-imagen')?.value || document.getElementById('imagen')?.value || '';
        return {
          colorCaja: descripcion,
          stock,
          precioVariante,
          imagen
        };
      });
    }

    document.getElementById('formProducto').addEventListener('submit', async function(e) {
      e.preventDefault();

      const categoria = document.getElementById('categoria').value;
      const producto = {
        nombre: document.getElementById('nombre').value,
        marca: document.getElementById('marca').value,
        categoria,
        descripcion: document.getElementById('descripcion').value,
        precioActual: parseInt(document.getElementById('precio').value),
        especificaciones: obtenerEspecificaciones(categoria),
        variantes: obtenerVariantesDesdeFormulario(),
        reviews: [],
        disponibilidad: { online: { stock: 0, envio_dias: 0 } },
        metadata: {
          creadoEn: new Date().toISOString().split('T')[0],
          actualizadoEn: new Date().toISOString().split('T')[0],
          vistas: 0,
          compras: 0,
          tags: []
        }
      };

      try {
        const response = await fetch('https://localhost:7092/api/producto', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(producto)
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        alert('Producto creado correctamente.');
        window.location.href = 'home.html';
      } catch (error) {
        console.error('Error al crear el producto:', error);
        alert('No se pudo crear el producto. Asegúrate de tener el backend disponible.');
      }
    });
  </script>

</body>
</html>
