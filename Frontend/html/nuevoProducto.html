<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../dist/output.css">
  <title>Nuevo Producto</title>
</head>

<body class="bg-gray-100">

  
  <header class="p-6 bg-white shadow">
    <h1 class="tracking-[0.3em] text-sm">MAISON DE LUXE</h1>
  </header>

  <div class="max-w-3xl mx-auto mt-10 bg-white p-10 shadow">

    <a href="home.html" class="text-sm text-gray-500 mb-6 inline-block">
      ← Volver
    </a>

    <h2 class="text-2xl mb-8">Nueva Creación</h2>

    <form class="space-y-6">

      <div>
        <label class="text-xs text-gray-400">Nombre</label>
        <input class="w-full border p-3 mt-1" placeholder="Anillo de diamantes">
      </div>

      <div>
        <label class="text-xs text-gray-400">Maison</label>
        <input class="w-full border p-3 mt-1" placeholder="Cartier">
      </div>

      <div>
        <label class="text-xs text-gray-400">Categoría</label>
        <input class="w-full border p-3 mt-1" placeholder="Anillo, Collar...">
      </div>

      <div>
        <label class="text-xs text-gray-400">Color</label>
        <input class="w-full border p-3 mt-1" placeholder="Oro, Plata...">
      </div>

      <div>
        <label class="text-xs text-gray-400">Precio</label>
        <input type="number" class="w-full border p-3 mt-1" placeholder="0.00">
      </div>

      <div>
        <label class="text-xs text-gray-400">Imagen URL</label>
        <input class="w-full border p-3 mt-1" placeholder="https://...">
      </div>

      <div>
        <label class="text-xs text-gray-400">Descripción</label>
        <textarea class="w-full border p-3 mt-1 h-32"></textarea>
      </div>

      <div class="flex gap-4 mt-6">
        <button class="bg-black text-white px-6 py-3">
          Crear
        </button>

        <a href="home.html" class="border px-6 py-3">
          Cancelar
        </a>
      </div>

    </form>

  </div>

</body>
</html>
