<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../dist/output.css">
  <script src="https://cdn.tailwindcss.com"></script> <title>Catálogo - Maison de Luxe</title>
  <style>
    /* Estilizar la barra de scroll y el input range para un look premium */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background-color: #e5e7eb; border-radius: 10px; }
    input[type=range] { accent-color: #111827; }
    
    /* Ocultar scrollbar en elementos horizontales si es necesario */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>

<body class="bg-[#fcfcfc] font-sans antialiased text-gray-900">

  <header class="sticky top-0 z-50 flex justify-between items-center px-8 py-5 bg-white/90 backdrop-blur-md border-b border-gray-100">
    <h1 class="text-sm font-light tracking-[0.4em] uppercase text-gray-900">Maison de Luxe</h1>
    <a href="nuevoProducto.html" class="text-[11px] font-semibold tracking-widest uppercase bg-black text-white px-6 py-3 hover:bg-gray-800 transition-colors">
      + Nuevo Producto
    </a>
  </header>

  <div class="flex flex-col md:flex-row max-w-[1600px] mx-auto mt-8 mb-20 px-6 gap-10">
    
    <aside class="w-full md:w-64 flex-shrink-0">
      <div class="sticky top-28">
        <h2 class="text-[10px] font-bold tracking-widest text-gray-400 uppercase mb-8 border-b border-gray-200 pb-3">Filtros de Colección</h2>

        <div class="mb-10">
          <h3 class="text-xs font-semibold uppercase tracking-wider mb-4">Categorías</h3>
          <div class="space-y-3 text-sm text-gray-600" id="filtroCategoria">
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="checkbox" value="reloj" class="filter-check w-4 h-4 text-black border-gray-300 rounded-sm focus:ring-black">
              <span class="group-hover:text-black transition-colors">Relojes</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="checkbox" value="anillo" class="filter-check w-4 h-4 text-black border-gray-300 rounded-sm focus:ring-black">
              <span class="group-hover:text-black transition-colors">Anillos</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="checkbox" value="pendientes" class="filter-check w-4 h-4 text-black border-gray-300 rounded-sm focus:ring-black">
              <span class="group-hover:text-black transition-colors">Pendientes</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="checkbox" value="cadena" class="filter-check w-4 h-4 text-black border-gray-300 rounded-sm focus:ring-black">
              <span class="group-hover:text-black transition-colors">Cadenas</span>
            </label>
          </div>
        </div>

        <div class="mb-10">
          <h3 class="text-xs font-semibold uppercase tracking-wider mb-4">Maison / Marca</h3>
          <input type="text" id="filtroMarca" placeholder="Buscar firma..." class="w-full border-b border-gray-300 py-2 text-sm bg-transparent focus:outline-none focus:border-black transition-colors placeholder-gray-400">
        </div>

        <div class="mb-10">
          <h3 class="text-xs font-semibold uppercase tracking-wider mb-4">Inversión Máxima</h3>
          <input type="range" id="filtroPrecio" min="0" max="50000000" step="100000" class="w-full cursor-pointer">
          <p class="text-xs text-gray-500 mt-3 font-medium">Hasta: $<span id="precioMax" class="text-gray-900">50.000.000</span></p>
        </div>
      </div>
    </aside>

    <main class="flex-1">
      
      <div class="mb-10 relative">
        <span class="absolute left-0 top-3 text-gray-400 text-lg">⚲</span>
        <input 
          id="busqueda"
          class="w-full py-3 pl-8 text-lg font-light bg-transparent border-b-2 border-gray-200 focus:outline-none focus:border-black transition-colors placeholder-gray-300" 
          placeholder="Buscar una pieza específica..."
        >
      </div>

      <div class="mb-6 flex justify-between items-center text-xs text-gray-500 uppercase tracking-widest">
        <span id="contadorProductos">Cargando piezas...</span>
      </div>

      <div id="gridProductos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-16">
        <div class="animate-pulse flex flex-col gap-4">
          <div class="bg-gray-200 aspect-[4/5] w-full"></div>
          <div class="h-4 bg-gray-200 w-1/3"></div>
          <div class="h-6 bg-gray-200 w-2/3"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    let todosProductos = [];

    async function cargarProductos() {
      try {
        const response = await fetch('https://localhost:7092/api/producto');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        todosProductos = await response.json();
      } catch (error) {
        console.warn('Backend no disponible. Cargando datos de demostración para visualizar el diseño.');
        // MOCK DATA: Solo para que puedas ver el diseño si tu API falla
        todosProductos = [
          {
            id: 1, nombre: "Datejust Perpetual", marca: "Rolex", categoria: "reloj", precioActual: 15128000,
            variantes: [{ imagen: "https://images.unsplash.com/photo-1523170335258-f5ed11844a49?q=80&w=600&auto=format&fit=crop", stock: 3 }],
            reviews: [{ calificacion: 5, titulo: "Perfección absoluta" }]
          },
          {
            id: 2, nombre: "Twisted Gold Hoops", marca: "Cartier", categoria: "pendientes", precioActual: 2450000,
            variantes: [{ imagen: "https://images.unsplash.com/photo-1611591437281-460bfbe1220a?q=80&w=600&auto=format&fit=crop", stock: 0 }],
            reviews: []
          },
          {
            id: 3, nombre: "Anillo Solitario Diamante", marca: "Tiffany & Co.", categoria: "anillo", precioActual: 8900000,
            variantes: [{ imagen: "https://images.unsplash.com/photo-1605100804763-247f66126e28?q=80&w=600&auto=format&fit=crop", stock: 1 }],
            reviews: [{ calificacion: 4.8, titulo: "Impresionante" }]
          }
        ];
      }
      mostrarProductos(todosProductos);
    }

    function mostrarProductos(productos) {
      const grid = document.getElementById('gridProductos');
      const contador = document.getElementById('contadorProductos');
      grid.innerHTML = '';
      
      contador.textContent = `${productos.length} Pieza${productos.length !== 1 ? 's' : ''}`;

      if (productos.length === 0) {
        grid.innerHTML = '<p class="col-span-full text-center text-gray-400 py-20 font-light text-lg">No se encontraron piezas con estos criterios.</p>';
        return;
      }

      productos.forEach(producto => {
        const variante = producto.variantes?.[0] || {};
        const imagenUrl = variante.imagen || 'https://images.unsplash.com/photo-1617038260897-41a1f14a8ca0?w=600';
        const review = producto.reviews?.[0];
        
        // Indicador de Stock elegante
        const stockInfo = variante.stock > 0 
          ? `<span class="flex items-center gap-1.5 text-[#2c5234]"><span class="w-1.5 h-1.5 rounded-full bg-[#2c5234]"></span> ${variante.stock} disp.</span>` 
          : `<span class="flex items-center gap-1.5 text-gray-400"><span class="w-1.5 h-1.5 rounded-full bg-gray-300"></span> Agotado</span>`;

        // Estrellas
        const rating = review ? `<span class="flex items-center gap-1 text-xs text-gray-500"><span class="text-yellow-600">★</span> ${review.calificacion}</span>` : '';

        const html = `
          <div class="group flex flex-col cursor-pointer">
            <div class="relative overflow-hidden bg-[#f4f4f4] aspect-[4/5] mb-5">
              <img src="${imagenUrl}" alt="${producto.nombre}" class="w-full h-full object-cover object-center mix-blend-multiply transition-transform duration-700 ease-in-out group-hover:scale-105">
              <div class="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
            </div>

            <div class="flex flex-col flex-1">
              <div class="flex justify-between items-start mb-1">
                <p class="text-[10px] font-semibold tracking-[0.2em] text-gray-500 uppercase">${producto.marca}</p>
                ${rating}
              </div>
              <h2 class="text-lg font-light text-gray-900 leading-snug mb-1">${producto.nombre}</h2>
              <p class="text-sm font-medium text-gray-900 mt-auto pt-2">$${producto.precioActual.toLocaleString('es-AR')}</p>
            </div>

            <div class="mt-4 pt-4 border-t border-gray-100 flex items-center justify-between text-[11px] font-medium tracking-widest uppercase">
              <div class="text-gray-500">${stockInfo}</div>
              <div class="flex gap-4">
                <a href="detalle.html?id=${producto.id}" class="text-gray-400 hover:text-black transition-colors">Ver</a>
                <a href="editar.html?id=${producto.id}" class="text-gray-400 hover:text-black transition-colors">Editar</a>
              </div>
            </div>
          </div>
        `;
        grid.innerHTML += html;
      });
    }

    function filtrarProductos() {
      let filtrados = todosProductos;
      
      const categorias = Array.from(document.querySelectorAll('.filter-check:checked')).map(el => el.value);
      if (categorias.length > 0) {
        filtrados = filtrados.filter(p => categorias.includes(p.categoria?.toLowerCase()));
      }
      
      const marca = document.getElementById('filtroMarca').value.toLowerCase();
      if (marca) {
        filtrados = filtrados.filter(p => p.marca?.toLowerCase().includes(marca));
      }
      
      const precioMax = parseInt(document.getElementById('filtroPrecio').value);
      filtrados = filtrados.filter(p => p.precioActual <= precioMax);
      
      const busqueda = document.getElementById('busqueda').value.toLowerCase();
      if (busqueda) {
        filtrados = filtrados.filter(p =>
          p.nombre?.toLowerCase().includes(busqueda) ||
          p.marca?.toLowerCase().includes(busqueda) ||
          p.categoria?.toLowerCase().includes(busqueda)
        );
      }
      mostrarProductos(filtrados);
    }

    // Event Listeners
    document.querySelectorAll('.filter-check').forEach(el => el.addEventListener('change', filtrarProductos));
    document.getElementById('filtroMarca').addEventListener('input', filtrarProductos);
    
    const sliderPrecio = document.getElementById('filtroPrecio');
    const labelPrecioMax = document.getElementById('precioMax');
    
    // Set initial value for slider to avoid maxing out immediately visually if not needed
    sliderPrecio.value = 50000000; 

    sliderPrecio.addEventListener('input', () => {
      labelPrecioMax.textContent = parseInt(sliderPrecio.value).toLocaleString('es-AR');
      filtrarProductos();
    });
    
    document.getElementById('busqueda').addEventListener('input', filtrarProductos);

    // Init
    cargarProductos();
  </script>

</body>
</html>
