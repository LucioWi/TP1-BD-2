<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../dist/output.css">
  <title>Maison de Luxe - Joyería Premium</title>
</head>

<body class="bg-gray-100">

  <header class="flex justify-between items-center p-6 bg-white shadow">
    <h1 class="text-lg tracking-[0.3em]">LUXE</h1>
    <a href="nuevoProducto.html" class="bg-black text-white px-4 py-2 text-sm">
      + Nuevo Producto
    </a>
  </header>

  <div class="flex">
    <aside class="w-64 bg-white p-6">
      <h2 class="text-xs text-gray-400 mb-6">FILTRAR</h2>

      <div class="mb-6">
        <h3 class="font-semibold mb-2">Categorías</h3>
        <div class="space-y-1 text-sm" id="filtroCategoria">
          <label><input type="checkbox" value="reloj" class="filter-check"> Reloj</label><br>
          <label><input type="checkbox" value="anillo" class="filter-check"> Anillo</label><br>
          <label><input type="checkbox" value="pendientes" class="filter-check"> Pendientes</label><br>
          <label><input type="checkbox" value="cadena" class="filter-check"> Cadena</label>
        </div>
      </div>

      <div class="mb-6">
        <h3 class="font-semibold mb-2">Marca</h3>
        <div class="text-sm">
          <input type="text" id="filtroMarca" placeholder="Buscar marca..." class="w-full border p-2">
        </div>
      </div>

      <div class="mb-6">
        <h3 class="font-semibold mb-2">Rango de Precio</h3>
        <div class="text-sm space-y-2">
          <input type="range" id="filtroPrecio" min="0" max="100000000" class="w-full">
          <p>Hasta: $<span id="precioMax">100000000</span></p>
        </div>
      </div>
    </aside>

    <main class="flex-1 p-6">
      <input 
        id="busqueda"
        class="w-full p-3 border mb-6 text-sm" 
        placeholder="Buscar productos..."
      >

      <div id="gridProductos" class="grid grid-cols-3 gap-6">
        <!-- Los productos se cargarán aquí -->
      </div>
    </main>
  </div>

  <script>
    let todosProductos = [];

    async function cargarProductos() {
      try {
        const response = await fetch('https://localhost:7092/api/producto');
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        todosProductos = await response.json();
        mostrarProductos(todosProductos);
      } catch (error) {
        console.error('Error cargando productos:', error);
        document.getElementById('gridProductos').innerHTML = '<p class="text-red-600">No se pudieron cargar los productos. Comprueba que el backend esté activo.</p>';
      }
    }

    function mostrarProductos(productos) {
      const grid = document.getElementById('gridProductos');
      grid.innerHTML = '';

      productos.forEach(producto => {
        const variante = producto.variantes?.[0] || {};
        const imagenUrl = variante.imagen || 'https://images.unsplash.com/photo-1617038260897-41a1f14a8ca0?w=600';
        const review = producto.reviews?.[0];

        const html = `
          <div class="bg-white p-4 shadow hover:shadow-lg transition">
            <img src="${imagenUrl}" class="mb-3 w-full h-48 object-cover">
            <p class="text-xs text-gray-400">${producto.marca}</p>
            <h2 class="font-semibold">${producto.nombre}</h2>
            <p class="text-xs text-gray-500 mb-2">${producto.categoria}</p>
            <p class="font-bold mt-2">$${producto.precioActual.toLocaleString()}</p>
            ${producto.variantes?.length > 1 ? `<p class="text-xs text-blue-600 mt-1">${producto.variantes.length} variantes disponibles</p>` : ''}
            ${review ? `<div class="text-xs text-yellow-500 mt-1">⭐ ${review.calificacion}/5 - ${review.titulo}</div>` : ''}
            ${variante.stock && variante.stock > 0 ? `<p class="text-xs text-green-600 mt-1">✓ ${variante.stock} en stock</p>` : `<p class="text-xs text-red-600 mt-1">✗ Sin stock</p>`}
            <div class="flex gap-2 mt-3 text-sm">
              <a href="detalle.html?id=${producto.id}" class="bg-gray-200 px-2 py-1 flex-1 text-center">Ver</a>
              <a href="editar.html?id=${producto.id}" class="bg-gray-200 px-2 py-1 flex-1 text-center">Editar</a>
            </div>
          </div>
        `;
        grid.innerHTML += html;
      });
    }

    function filtrarProductos() {
      let filtrados = todosProductos;
      const categorias = Array.from(document.querySelectorAll('.filter-check:checked')).map(el => el.value);
      if (categorias.length > 0) {
        filtrados = filtrados.filter(p => categorias.includes(p.categoria));
      }
      const marca = document.getElementById('filtroMarca').value.toLowerCase();
      if (marca) {
        filtrados = filtrados.filter(p => p.marca.toLowerCase().includes(marca));
      }
      const precioMax = parseInt(document.getElementById('filtroPrecio').value);
      filtrados = filtrados.filter(p => p.precioActual <= precioMax);
      const busqueda = document.getElementById('busqueda').value.toLowerCase();
      if (busqueda) {
        filtrados = filtrados.filter(p =>
          p.nombre.toLowerCase().includes(busqueda) ||
          p.marca.toLowerCase().includes(busqueda) ||
          p.categoria.toLowerCase().includes(busqueda)
        );
      }
      mostrarProductos(filtrados);
    }

    document.querySelectorAll('.filter-check').forEach(el => {
      el.addEventListener('change', filtrarProductos);
    });
    document.getElementById('filtroMarca').addEventListener('input', filtrarProductos);
    document.getElementById('filtroPrecio').addEventListener('input', () => {
      document.getElementById('precioMax').textContent = parseInt(document.getElementById('filtroPrecio').value).toLocaleString();
      filtrarProductos();
    });
    document.getElementById('busqueda').addEventListener('input', filtrarProductos);

    cargarProductos();
  </script>

</body>
</html>
