<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../dist/output.css">
  <title>Maison de Luxe</title>
</head>

<body class="bg-gray-100">

  
  <header class="flex justify-between items-center p-6 bg-white shadow">
    <h1 class="text-lg tracking-[0.3em]">LUXE</h1>

    <a href="nuevoProducto.html" class="bg-black text-white px-4 py-2 text-sm">
      + Nuevo Producto
    </a>
  </header>

  <div class="flex">

    
    <aside class="w-64 bg-white p-6">
      <h2 class="text-xs text-gray-400 mb-6">FILTRAR</h2>

      <div class="mb-6">
        <h3 class="font-semibold mb-2">Marcas</h3>
        <div class="space-y-1 text-sm">
          <label><input type="checkbox"> Tiffany & Co.</label><br>
          <label><input type="checkbox"> Cartier</label><br>
          <label><input type="checkbox"> Rolex</label>
        </div>
      </div>

      <div class="mb-6">
        <h3 class="font-semibold mb-2">Categorías</h3>
        <div class="space-y-1 text-sm">
          <label><input type="checkbox"> Anillo</label><br>
          <label><input type="checkbox"> Collar</label>
        </div>
      </div>

      <div class="mb-6">
        <h3 class="font-semibold mb-2">Materiales</h3>
        <div class="space-y-1 text-sm">
          <label><input type="checkbox"> Oro</label><br>
          <label><input type="checkbox"> Oro Rosa</label>
        </div>
      </div>
    </aside>

    <main class="flex-1 p-6">

      <input 
        class="w-full p-3 border mb-6 text-sm" 
        placeholder="Buscar..."
      >

      <div class="grid grid-cols-3 gap-6">

        
        <div class="bg-white p-4 shadow hover:shadow-lg transition">

          <img src="https://images.unsplash.com/photo-1617038260897-41a1f14a8ca0" class="mb-3">

          <p class="text-xs text-gray-400">Tiffany & Co.</p>
          <h2 class="font-semibold">Anillo de Diamantes</h2>
          <p class="font-bold mt-2">$2450</p>

          <div class="flex gap-2 mt-3 text-sm">
            <a href="detalle.html?id=1" class="bg-gray-200 px-2 py-1">Ver</a>
            <a href="editar.html" class="bg-gray-200 px-2 py-1">Editar</a>
            <button onclick="abrirModal()" class="bg-red-500 text-white px-2 py-1">
              Eliminar
            </button>
          </div>

        </div>

        
        <div class="bg-white p-4 shadow hover:shadow-lg transition">

          <img src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f" class="mb-3">

          <p class="text-xs text-gray-400">Cartier</p>
          <h2 class="font-semibold">Collar de Oro</h2>
          <p class="font-bold mt-2">$3200</p>

          <div class="flex gap-2 mt-3 text-sm">
            <a href="detalle.html?id=2" class="bg-gray-200 px-2 py-1">Ver</a>
            <a href="editar.html" class="bg-gray-200 px-2 py-1">Editar</a>
            <button onclick="abrirModal()" class="bg-red-500 text-white px-2 py-1">
              Eliminar
            </button>
          </div>

        </div>

      </div>

    </main>

  </div>

  
  <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center">

    <div onclick="event.stopPropagation()" class="bg-white p-6 w-80 text-center shadow-lg">

      <h2 class="text-lg mb-4">¿Eliminar producto?</h2>
      <p class="text-sm text-gray-500 mb-6">
        Esta acción no se puede deshacer
      </p>

      <div class="flex justify-center gap-4">
        <button onclick="cerrarModal()" class="border px-4 py-2">
          Cancelar
        </button>

        <button class="bg-red-500 text-white px-4 py-2">
          Eliminar
        </button>
      </div>

    </div>

  </div>

  
  <script>
    function abrirModal() {
      const modal = document.getElementById("modal");
      modal.classList.remove("hidden");
      modal.classList.add("flex");
    }

    function cerrarModal() {
      const modal = document.getElementById("modal");
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    }
  </script>

</body>
</html>
