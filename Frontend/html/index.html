<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../dist/output.css">
  <script src="https://cdn.tailwindcss.com"></script> <title>Catálogo - Maison de Luxe</title>
  <style>
    /* Estilizar la barra de scroll y el input range para un look premium */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background-color: #e5e7eb; border-radius: 10px; }
    input[type=range] { accent-color: #111827; }
    
    /* Ocultar scrollbar en elementos horizontales si es necesario */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>

<body class="bg-[#fcfcfc] font-sans antialiased text-gray-900">

  <header class="sticky top-0 z-50 flex justify-between items-center px-8 py-5 bg-white/90 backdrop-blur-md border-b border-gray-100">
    <h1 class="text-sm font-light tracking-[0.4em] uppercase text-gray-900">Maison de Luxe</h1>
    <div class="flex items-center space-x-4" >
      <a href="nuevoProducto.html" class="text-[11px] font-semibold tracking-widest uppercase bg-black text-white px-6 py-3 hover:bg-gray-800 transition-colors">
        Nuevo Producto
      </a>
      <a href="dashboard.html" class="text-[11px] font-semibold tracking-widest uppercase bg-black text-white px-6 py-3 hover:bg-gray-800 transition-colors">
        Panel Control
      </a>
      <a href="editar.html" class="text-[11px] font-semibold tracking-widest uppercase bg-black text-white px-6 py-3 hover:bg-gray-800 transition-colors">
        Modificar Producto
      </a>
    </div>
  </header>

  <div class="flex flex-col md:flex-row max-w-[1600px] mx-auto mt-8 mb-20 px-6 gap-10">
    
    <aside class="w-full md:w-64 flex-shrink-0">
      <div class="sticky top-28">
        <h2 class="text-[10px] font-bold tracking-widest text-gray-400 uppercase mb-8 border-b border-gray-200 pb-3">Filtros de Colección</h2>

        <div class="mb-10">
          <h3 class="text-xs font-semibold uppercase tracking-wider mb-4">Categorías</h3>
          <div class="space-y-3 text-sm text-gray-600" id="filtroCategoria">
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="checkbox" value="reloj" class="filter-check w-4 h-4 text-black border-gray-300 rounded-sm focus:ring-black">
              <span class="group-hover:text-black transition-colors">Relojes</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="checkbox" value="anillo" class="filter-check w-4 h-4 text-black border-gray-300 rounded-sm focus:ring-black">
              <span class="group-hover:text-black transition-colors">Anillos</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="checkbox" value="pendientes" class="filter-check w-4 h-4 text-black border-gray-300 rounded-sm focus:ring-black">
              <span class="group-hover:text-black transition-colors">Pendientes</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="checkbox" value="cadena" class="filter-check w-4 h-4 text-black border-gray-300 rounded-sm focus:ring-black">
              <span class="group-hover:text-black transition-colors">Cadenas</span>
            </label>
          </div>
        </div>

        <div class="mb-10">
          <h3 class="text-xs font-semibold uppercase tracking-wider mb-4">Maison / Marca</h3>
          <input type="text" id="filtroMarca" placeholder="Buscar firma..." class="w-full border-b border-gray-300 py-2 text-sm bg-transparent focus:outline-none focus:border-black transition-colors placeholder-gray-400">
        </div>

        <div class="mb-10">
          <h3 class="text-xs font-semibold uppercase tracking-wider mb-4">Inversión Máxima</h3>
          <input type="range" id="filtroPrecio" min="0" max="50000000" step="100000" class="w-full cursor-pointer">
          <p class="text-xs text-gray-500 mt-3 font-medium">Hasta: $<span id="precioMax" class="text-gray-900">50.000.000</span></p>
        </div>
      </div>
    </aside>

    <main class="flex-1">
      
      <div class="mb-10 relative">
        <span class="absolute left-0 top-3 text-gray-400 text-lg">⚲</span>
        <input 
          id="busqueda"
          class="w-full py-3 pl-8 text-lg font-light bg-transparent border-b-2 border-gray-200 focus:outline-none focus:border-black transition-colors placeholder-gray-300" 
          placeholder="Buscar una pieza específica..."
        >
      </div>

      <div class="mb-6 flex justify-between items-center text-xs text-gray-500 uppercase tracking-widest">
        <span id="contadorProductos">Cargando piezas...</span>
      </div>

      <div id="gridProductos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-16">
        <div class="animate-pulse flex flex-col gap-4">
          <div class="bg-gray-200 aspect-[4/5] w-full"></div>
          <div class="h-4 bg-gray-200 w-1/3"></div>
          <div class="h-6 bg-gray-200 w-2/3"></div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="../js/main.js"></script>

</body>
</html>
