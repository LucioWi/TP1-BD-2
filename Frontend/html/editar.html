<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../dist/output.css">
  <title>Editar Producto</title>
</head>

<body class="bg-gray-100">

  <header class="p-6 bg-white shadow">
    <h1 class="tracking-[0.3em] text-sm">MAISON DE LUXE</h1>
  </header>

  <div class="max-w-3xl mx-auto mt-10 bg-white p-10 shadow">

    <a href="index.html" class="text-sm text-gray-500 mb-6 inline-block">
      ← Volver
    </a>

    <h2 class="text-2xl mb-8">Editar Producto</h2>

    <!-- Sección de búsqueda de producto -->
    <div class="bg-yellow-50 p-6 rounded border-2 border-yellow-300 mb-6" id="seccionBusqueda">
      <h3 class="font-bold text-gray-800 mb-1">⭐ Paso 1: Seleccionar Producto (OBLIGATORIO)</h3>
      <p class="text-xs text-gray-600 mb-4">Debes seleccionar un producto para poder editarlo</p>
      <div class="space-y-3">
        <div>
          <label class="text-xs text-gray-700 font-semibold block mb-2">Buscar por nombre o marca</label>
          <input id="buscarProducto" class="w-full border-2 p-3 rounded" placeholder="Ej: Reloj Rolex, Anillo Oro...">
          <div id="sugerenciasProductos" class="absolute bg-white border border-gray-300 rounded mt-1 w-full shadow-lg z-10 hidden max-w-sm">
            <!-- Las sugerencias se renderizarán aquí -->
          </div>
        </div>
        <div>
          <label class="text-xs text-gray-700 font-semibold block mb-2">Seleccionar de la lista <span class="text-red-600">*</span></label>
          <select id="selectProducto" class="w-full border-2 border-red-300 p-3 rounded font-semibold" onchange="cargarProductoSeleccionado()" required>
            <option value="">-- Elige un producto --</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Formulario de edición (oculto hasta seleccionar producto) -->
    <form class="space-y-6 hidden" id="formEditar">

      <div>
        <label class="text-xs text-gray-400">Nombre</label>
        <input id="nombre" class="w-full border p-3 mt-1" required>
      </div>

      <div>
        <label class="text-xs text-gray-400">Marca</label>
        <input id="marca" class="w-full border p-3 mt-1" required>
      </div>

      <div>
        <label class="text-xs text-gray-400">Categoría</label>
        <select id="categoria" class="w-full border p-3 mt-1" required>
          <option value="">Seleccionar categoría...</option>
          <option value="reloj">Reloj</option>
          <option value="anillo">Anillo</option>
          <option value="pendientes">Pendientes</option>
          <option value="cadena">Cadena</option>
          <option value="brazalete">Brazalete</option>
        </select>
      </div>

      <div>
        <label class="text-xs text-gray-400">Descripción</label>
        <textarea id="descripcion" class="w-full border p-3 mt-1 h-24"></textarea>
      </div>


      <div class="border-t pt-6">
        <h3 class="font-semibold text-gray-700 mb-3">Variantes del Producto</h3>
        <div id="variantesEdicion" class="space-y-3"></div>
        <button type="button" onclick="agregarVariante()" class="text-blue-600 text-sm mt-4 hover:text-blue-800 font-semibold">
          + Agregar nueva variante
        </button>
      </div>

      <div class="flex gap-4 mt-6">
        <button type="submit" class="bg-black text-white px-6 py-3">Guardar producto</button>
        <button type="button" onclick="volverAlSelector()" class="bg-gray-500 text-white px-6 py-3 hover:bg-gray-600">Cambiar Producto</button>
        <a href="index.html" class="border px-6 py-3">Cancelar</a>
      </div>
    </form>

  </div>

  <script type="module" src="../js/editar.js"></script>

</body>
</html>
