<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../dist/output.css">
  <script src="https://cdn.tailwindcss.com"></script> <title>Detalle Producto - Maison de Luxe</title>
  <style>
    /* Transiciones suaves para las pestañas */
    .tab-btn { 
      padding: 0.75rem 0; 
      cursor: pointer; 
      border-bottom: 2px solid transparent; 
      color: #6b7280;
      transition: all 0.3s ease;
    }
    .tab-btn:hover { color: #111827; }
    .tab-btn.active { 
      border-bottom-color: #111827; 
      color: #111827;
      font-weight: 600; 
    }
    .tab-content { 
      display: none; 
      animation: fadeIn 0.4s ease-in-out;
    }
    .tab-content.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="bg-[#f9fafb] font-sans antialiased text-gray-900">

  <header class="p-6 bg-white border-b border-gray-200 text-center">
    <h1 class="tracking-[0.4em] text-sm font-light uppercase text-gray-800">Maison de Luxe</h1>
  </header>

  <main class="max-w-6xl mx-auto mt-10 mb-20 bg-white p-8 md:p-12 shadow-sm rounded-lg border border-gray-100">

    <a href="index.html" class="text-xs font-medium uppercase tracking-wider text-gray-400 hover:text-black transition-colors mb-8 inline-flex items-center gap-2">
      <span>←</span> Volver al catálogo
    </a>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-16" id="detalleProducto">
      <div class="animate-pulse bg-gray-200 h-[500px] rounded-md"></div>
      <div class="animate-pulse space-y-4 mt-8">
        <div class="h-4 bg-gray-200 rounded w-1/4"></div>
        <div class="h-8 bg-gray-200 rounded w-3/4"></div>
        <div class="h-6 bg-gray-200 rounded w-1/3"></div>
        <div class="h-24 bg-gray-200 rounded w-full"></div>
      </div>
    </div>

  </main>

  <script type="module">
    import { getProductoById } from "../js/services/apiService.js";

    // Utilidad para limpiar nombres de propiedades (ej: "diametroMm" -> "Diametro Mm")
    function formatCamelCase(text) {
      const result = text.replace(/([A-Z])/g, " $1");
      return result.charAt(0).toUpperCase() + result.slice(1);
    }

    async function cargarProducto() {
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id') || '1'; // Fallback a 1 para pruebas si no hay ID

      try {
        // Reemplaza con tu URL real
        const producto = await getProductoById(productId);
        
        mostrarProducto(producto);
      } catch (error) {
        console.error('Error cargando producto:', error);
        document.getElementById('detalleProducto').innerHTML = `
          <div class="col-span-2 text-center py-10">
            <p class="text-red-500 font-medium">Error al cargar la información del producto.</p>
            <p class="text-sm text-gray-400 mt-2">Por favor, verifica la conexión con el servidor.</p>
          </div>`;
      }
    }

    function mostrarProducto(p) {
      const variante = p.variantes?.[0] || {};
      const especificaciones = p.especificaciones || {};

      // 1. ESPECIFICACIONES LIMPIAS (Ocultando nulls y formateando labels)
      let especsHTML = '';
      if (Object.keys(especificaciones).length > 0) {
        especsHTML = '<div class="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-4">';
        for (const [key, value] of Object.entries(especificaciones)) {
          if (value === null || value === '' || value === undefined) continue; // Ignorar nulos
          
          let displayValue = value;
          if (Array.isArray(value)) {
            displayValue = value.join(', '); // Formatear arrays limpios
          } else if (typeof value === 'object') {
            displayValue = JSON.stringify(value);
          }

          especsHTML += `
            <div class="flex flex-col border-b border-gray-100 pb-2">
              <span class="text-[10px] uppercase tracking-widest text-gray-400 mb-1">${formatCamelCase(key)}</span>
              <span class="text-sm font-medium text-gray-800 capitalize">${displayValue}</span>
            </div>
          `;
        }
        especsHTML += '</div>';
        if(especsHTML === '<div class="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-4"></div>') {
             especsHTML = '<p class="text-gray-500 text-sm italic">Especificaciones técnicas no disponibles.</p>';
        }
      }

      // Resto de pestañas simplificadas por espacio...
      let variantesHTML = '<p class="text-gray-500 text-sm">Información de variantes no disponible.</p>';
      let disponibilidadHTML = '<p class="text-gray-500 text-sm">Información de stock no disponible.</p>';
      let certificacionesHTML = '<p class="text-gray-500 text-sm">Sin certificados asociados.</p>';
      let reviewsHTML = '<p class="text-gray-500 text-sm">Sé el primero en valorar este producto.</p>';
      let historialHTML = '<p class="text-gray-500 text-sm">El historial de precios no está público.</p>';

      const imagenUrl = variante.imagen || 'https://images.unsplash.com/photo-1523170335258-f5ed11844a49?q=80&w=1000&auto=format&fit=crop'; // Imagen de respaldo más acorde a relojes
      
      // Tags en formato Badges
      let tagsHTML = '';
      if(p.metadata?.tags && p.metadata.tags.length > 0) {
          tagsHTML = p.metadata.tags.map(tag => `<span class="px-2 py-1 bg-gray-100 text-gray-600 rounded text-xs lowercase">${tag.replace('_', ' ')}</span>`).join('');
      }

      const html = `
        <div class="flex flex-col gap-4">
          <div class="bg-[#f4f4f4] rounded-lg p-8 flex items-center justify-center relative overflow-hidden group">
            <img src="${imagenUrl}" alt="${p.nombre}" class="w-full h-auto max-h-[500px] object-contain mix-blend-multiply transition-transform duration-500 group-hover:scale-105">
          </div>
          
          <div class="flex flex-wrap items-center justify-between mt-2 text-xs text-gray-400">
            <div class="flex gap-4">
              <span class="flex items-center gap-1">👁️ ${p.metadata?.vistas || 0} vistas</span>
              <span class="flex items-center gap-1">🛍️ ${p.metadata?.compras || 0} ventas</span>
            </div>
            <div class="flex gap-2 flex-wrap justify-end">
              ${tagsHTML}
            </div>
          </div>
        </div>

        <div class="flex flex-col">
          <p class="text-xs font-semibold tracking-widest text-gray-500 uppercase mb-2">${p.marca || 'Marca Desconocida'}</p>
          <h1 class="text-3xl md:text-4xl font-light text-black mb-4">${p.nombre}</h1>
          <p class="text-2xl font-medium text-gray-900 mb-6">$${(p.precioActual || 0).toLocaleString('es-AR')}</p>
          
          <p class="text-gray-600 text-sm leading-relaxed mb-8 border-l-2 border-gray-200 pl-4">${p.descripcion || 'Una pieza excepcional de alta joyería.'}</p>

          <div class="flex flex-col sm:flex-row gap-4 mb-10">
            <button class="flex-1 bg-black hover:bg-gray-800 text-white px-8 py-4 rounded-sm text-sm font-semibold tracking-wide uppercase transition-colors">
              Agregar al Carrito
            </button>
            <button class="sm:w-auto border border-gray-300 hover:border-black text-black px-6 py-4 rounded-sm text-sm font-semibold uppercase transition-colors flex items-center justify-center gap-2">
              <span class="text-lg leading-none">♡</span> Guardar
            </button>
          </div>

          <div class="border-b border-gray-200 mb-6 flex gap-6 overflow-x-auto whitespace-nowrap hide-scrollbar">
            <button class="tab-btn active text-sm uppercase tracking-wider" onclick="cambiarTab(event, 'especificaciones')">Especificaciones</button>
            <button class="tab-btn text-sm uppercase tracking-wider" onclick="cambiarTab(event, 'variantes')">Variantes</button>
            <button class="tab-btn text-sm uppercase tracking-wider" onclick="cambiarTab(event, 'disponibilidad')">Disponibilidad</button>
          </div>

          <div class="min-h-[200px]">
            <div id="especificaciones" class="tab-content active">
              ${especsHTML}
            </div>
            <div id="variantes" class="tab-content">
              ${variantesHTML}
            </div>
            <div id="disponibilidad" class="tab-content">
              ${disponibilidadHTML}
            </div>
          </div>

        </div>
      `;

      document.getElementById('detalleProducto').innerHTML = html;
    }

    function cambiarTab(e, tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

      document.getElementById(tabId).classList.add('active');
      e.target.classList.add('active');
    }
    window.cambiarTab = cambiarTab;

    cargarProducto();
  </script>
</body>
</html>
