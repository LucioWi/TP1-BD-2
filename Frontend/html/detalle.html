<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../dist/output.css">
  <script src="https://cdn.tailwindcss.com"></script> <title>Detalle Producto - Maison de Luxe</title>
  <style>
    /* Transiciones suaves para las pestañas */
    .tab-btn { 
      padding: 0.75rem 0; 
      cursor: pointer; 
      border-bottom: 2px solid transparent; 
      color: #6b7280;
      transition: all 0.3s ease;
    }
    .tab-btn:hover { color: #111827; }
    .tab-btn.active { 
      border-bottom-color: #111827; 
      color: #111827;
      font-weight: 600; 
    }
    .tab-content { 
      display: none; 
      animation: fadeIn 0.4s ease-in-out;
    }
    .tab-content.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="bg-[#f9fafb] font-sans antialiased text-gray-900">

  <header class="p-6 bg-white border-b border-gray-200 text-center">
    <h1 class="tracking-[0.4em] text-sm font-light uppercase text-gray-800">Maison de Luxe</h1>
  </header>

  <main class="max-w-6xl mx-auto mt-10 mb-20 bg-white p-8 md:p-12 shadow-sm rounded-lg border border-gray-100">

    <a href="index.html" class="text-xs font-medium uppercase tracking-wider text-gray-400 hover:text-black transition-colors mb-8 inline-flex items-center gap-2">
      <span>←</span> Volver al catálogo
    </a>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-16" id="detalleProducto">
      <div class="animate-pulse bg-gray-200 h-[500px] rounded-md"></div>
      <div class="animate-pulse space-y-4 mt-8">
        <div class="h-4 bg-gray-200 rounded w-1/4"></div>
        <div class="h-8 bg-gray-200 rounded w-3/4"></div>
        <div class="h-6 bg-gray-200 rounded w-1/3"></div>
        <div class="h-24 bg-gray-200 rounded w-full"></div>
      </div>
    </div>

  </main>

  <script type="module">
    import { getProductoById } from "../js/services/apiService.js";

    const FALLBACK_IMG = 'https://images.unsplash.com/photo-1523170335258-f5ed11844a49?q=80&w=1000&auto=format&fit=crop';
    let detalleVariantes = [];

    // Utilidad para limpiar nombres de propiedades (ej: "diametroMm" -> "Diametro Mm")
    function formatCamelCase(text) {
      const result = text.replace(/([A-Z])/g, " $1");
      return result.charAt(0).toUpperCase() + result.slice(1);
    }

    function getVariantLabel(variant, index) {
      return variant.colorCaja || variant.talleAnillo || variant.metal || variant.descripcion || `Variante ${index + 1}`;
    }

    function normalizeVariants(variantes = [], precioBase = 0) {
      return variantes.map((variant, index) => {
        const parsedStock = Number(variant?.stock);
        const hasVariantPrice = variant?.precioVariante !== undefined && variant?.precioVariante !== null && variant?.precioVariante !== '';
        const parsedVariantPrice = Number(variant?.precioVariante);

        return {
          ...variant,
          index,
          label: getVariantLabel(variant, index),
          stock: Number.isFinite(parsedStock) ? parsedStock : 0,
          precio: hasVariantPrice && Number.isFinite(parsedVariantPrice) ? parsedVariantPrice : Number(precioBase || 0),
          imagen: variant?.imagen || FALLBACK_IMG,
        };
      });
    }

    function renderVariantesTab(variantes) {
      if (!variantes.length) {
        return '<p class="text-gray-500 text-sm">Información de variantes no disponible.</p>';
      }

      return `
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          ${variantes
            .map(
              (variant, index) => `
              <button
                id="variante-card-${index}"
                class="w-full text-left border rounded-lg p-3 transition ${index === 0 ? 'border-black ring-1 ring-black' : 'border-gray-200 hover:border-gray-400'}"
                onclick="seleccionarVariante(${index})"
                type="button"
              >
                <div class="flex items-center gap-3">
                  <img src="${variant.imagen}" alt="${variant.label}" class="w-14 h-14 rounded object-cover border border-gray-200">
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900 truncate">${variant.label}</p>
                    <p class="text-xs text-gray-500 mt-1">Stock: ${variant.stock}</p>
                    <p class="text-xs font-semibold text-gray-800">$${variant.precio.toLocaleString('es-AR')}</p>
                  </div>
                </div>
              </button>
            `
            )
            .join('')}
        </div>
      `;
    }

    function renderDisponibilidadTab(variantes) {
      if (!variantes.length) {
        return '<p class="text-gray-500 text-sm">Información de stock no disponible.</p>';
      }

      return `
        <div class="space-y-2">
          ${variantes
            .map(
              (variant) => `
              <div class="flex items-center gap-3 border border-gray-200 rounded-md px-3 py-2">
                <img src="${variant.imagen}" alt="${variant.label}" class="w-12 h-12 rounded object-cover border border-gray-200">
                <div class="flex-1 min-w-0">
                  <p class="text-sm text-gray-900 truncate">${variant.label}</p>
                </div>
                <div class="text-sm font-semibold ${variant.stock > 0 ? 'text-[#2c5234]' : 'text-gray-400'}">
                  ${variant.stock} disp.
                </div>
              </div>
            `
            )
            .join('')}
        </div>
      `;
    }

    function seleccionarVariante(index) {
      const variant = detalleVariantes[index];
      if (!variant) return;

      const imageEl = document.getElementById('imagenPrincipal');
      const priceEl = document.getElementById('precioActual');
      const stockEl = document.getElementById('stockVarianteActual');

      if (imageEl) {
        imageEl.src = variant.imagen;
        imageEl.alt = variant.label;
      }
      if (priceEl) {
        priceEl.textContent = `$${variant.precio.toLocaleString('es-AR')}`;
      }
      if (stockEl) {
        stockEl.textContent = `${variant.stock} ${variant.label}`;
      }

      detalleVariantes.forEach((_, i) => {
        const card = document.getElementById(`variante-card-${i}`);
        if (!card) return;
        if (i === index) {
          card.classList.add('border-black', 'ring-1', 'ring-black');
          card.classList.remove('border-gray-200', 'hover:border-gray-400');
        } else {
          card.classList.remove('border-black', 'ring-1', 'ring-black');
          card.classList.add('border-gray-200', 'hover:border-gray-400');
        }
      });
    }

    window.seleccionarVariante = seleccionarVariante;

    async function cargarProducto() {
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id') || '1'; // Fallback a 1 para pruebas si no hay ID

      try {
        // Reemplaza con tu URL real
        const producto = await getProductoById(productId);
        
        mostrarProducto(producto);
      } catch (error) {
        console.error('Error cargando producto:', error);
        document.getElementById('detalleProducto').innerHTML = `
          <div class="col-span-2 text-center py-10">
            <p class="text-red-500 font-medium">Error al cargar la información del producto.</p>
            <p class="text-sm text-gray-400 mt-2">Por favor, verifica la conexión con el servidor.</p>
          </div>`;
      }
    }

    function mostrarProducto(p) {
      const especificaciones = p.especificaciones || {};
      detalleVariantes = normalizeVariants(p.variantes || [], p.precioActual || 0);
      const varianteInicial = detalleVariantes[0] || {
        label: 'Variante unica',
        stock: Number(p.metadata?.stock || 0),
        precio: Number(p.precioActual || 0),
        imagen: FALLBACK_IMG,
      };
      const stockTotal = detalleVariantes.reduce((acc, variant) => acc + (Number(variant.stock) || 0), 0);

      // 1. ESPECIFICACIONES LIMPIAS (Ocultando nulls y formateando labels)
      let especsHTML = '';
      if (Object.keys(especificaciones).length > 0) {
        especsHTML = '<div class="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-4">';
        for (const [key, value] of Object.entries(especificaciones)) {
          if (value === null || value === '' || value === undefined) continue; // Ignorar nulos
          
          let displayValue = value;
          if (Array.isArray(value)) {
            displayValue = value.join(', '); // Formatear arrays limpios
          } else if (typeof value === 'object') {
            displayValue = JSON.stringify(value);
          }

          especsHTML += `
            <div class="flex flex-col border-b border-gray-100 pb-2">
              <span class="text-[10px] uppercase tracking-widest text-gray-400 mb-1">${formatCamelCase(key)}</span>
              <span class="text-sm font-medium text-gray-800 capitalize">${displayValue}</span>
            </div>
          `;
        }
        especsHTML += '</div>';
        if(especsHTML === '<div class="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-4"></div>') {
             especsHTML = '<p class="text-gray-500 text-sm italic">Especificaciones técnicas no disponibles.</p>';
        }
      }

      const variantesHTML = renderVariantesTab(detalleVariantes);
      const disponibilidadHTML = renderDisponibilidadTab(detalleVariantes);

      // Tags en formato Badges
      let tagsHTML = '';
      if(p.metadata?.tags && p.metadata.tags.length > 0) {
          tagsHTML = p.metadata.tags.map(tag => `<span class="px-2 py-1 bg-gray-100 text-gray-600 rounded text-xs lowercase">${tag.replace('_', ' ')}</span>`).join('');
      }

      const html = `
        <div class="flex flex-col gap-4">
          <div class="bg-[#f4f4f4] rounded-lg p-8 flex items-center justify-center relative overflow-hidden group">
            <img id="imagenPrincipal" src="${varianteInicial.imagen}" alt="${p.nombre}" class="w-full h-auto max-h-[500px] object-contain mix-blend-multiply transition-transform duration-500 group-hover:scale-105">
          </div>
          
          <div class="flex flex-wrap items-center justify-between mt-2 text-xs text-gray-400">
            <div id="dataContainer" class="flex gap-4">
              <span class="flex items-center gap-1">👁️ ${p.metadata?.vistas || 0} vistas</span>
              <span class="flex items-center gap-1">🛍️ ${p.metadata?.compras || 0} ventas</span>
              <span class="flex items-center gap-1">📦 ${stockTotal} stock total</span>
            </div>
            <div class="flex gap-2 flex-wrap justify-end">
              ${tagsHTML}
            </div>
          </div>
        </div>

        <div class="flex flex-col">
          <p class="text-xs font-semibold tracking-widest text-gray-500 uppercase mb-2">${p.marca || 'Marca Desconocida'}</p>
          <h1 class="text-3xl md:text-4xl font-light text-black mb-4">${p.nombre}</h1>
          <p id="precioActual" class="text-2xl font-medium text-gray-900 mb-6">$${varianteInicial.precio.toLocaleString('es-AR')}</p>

          <p class="text-gray-600 text-sm leading-relaxed mb-8 border-l-2 border-gray-200 pl-4">${p.descripcion || 'Una pieza excepcional de alta joyería.'}</p>

          <div class="flex flex-col sm:flex-row gap-4 mb-10">
            <button class="flex-1 bg-black hover:bg-gray-800 text-white px-8 py-4 rounded-sm text-sm font-semibold tracking-wide uppercase transition-colors">
              Agregar al Carrito
            </button>
            <button class="sm:w-auto border border-gray-300 hover:border-black text-black px-6 py-4 rounded-sm text-sm font-semibold uppercase transition-colors flex items-center justify-center gap-2">
              <span class="text-lg leading-none">♡</span> Guardar
            </button>
          </div>

          <div class="border-b border-gray-200 mb-6 flex gap-6 overflow-x-auto whitespace-nowrap hide-scrollbar">
            <button class="tab-btn active text-sm uppercase tracking-wider" onclick="cambiarTab(event, 'especificaciones')">Especificaciones</button>
            <button class="tab-btn text-sm uppercase tracking-wider" onclick="cambiarTab(event, 'variantes')">Variantes</button>
            <button class="tab-btn text-sm uppercase tracking-wider" onclick="cambiarTab(event, 'disponibilidad')">Disponibilidad</button>
          </div>

          <div class="min-h-[200px]">
            <div id="especificaciones" class="tab-content active">
              ${especsHTML}
            </div>
            <div id="variantes" class="tab-content">
              ${variantesHTML}
            </div>
            <div id="disponibilidad" class="tab-content">
              ${disponibilidadHTML}
            </div>
          </div>

        </div>
      `;

      document.getElementById('detalleProducto').innerHTML = html;
    }

    function cambiarTab(e, tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

      document.getElementById(tabId).classList.add('active');
      e.target.classList.add('active');
    }
    window.cambiarTab = cambiarTab;

    cargarProducto();
  </script>
</body>
</html>
