<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../dist/output.css">
  <title>Detalle Producto</title>
  <style>
    .tabs { display: flex; gap: 1rem; border-bottom: 2px solid #e5e7eb; margin-bottom: 1rem; }
    .tab-btn { padding: 0.5rem 1rem; cursor: pointer; border-bottom: 3px solid transparent; }
    .tab-btn.active { border-bottom-color: #000; font-weight: bold; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>

<body class="bg-gray-100">

  <header class="p-6 bg-white shadow">
    <h1 class="tracking-[0.3em] text-sm">MAISON DE LUXE</h1>
  </header>

  <div class="max-w-6xl mx-auto mt-10 bg-white p-10 shadow">

    <a href="home.html" class="text-sm text-gray-500 mb-6 inline-block">
      ← Volver
    </a>

    <div class="grid grid-cols-2 gap-10" id="detalleProducto">
      <!-- Contenido dinámico -->
    </div>

  </div>

  <script>
    async function cargarProducto() {
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');

      try {
        const response = await fetch(`https://localhost:7092/api/producto/${productId}`);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const producto = await response.json();
        mostrarProducto(producto);
      } catch (error) {
        console.error('Error cargando producto:', error);
        document.getElementById('detalleProducto').innerHTML = '<p class="text-red-600">No se pudo cargar el producto. Comprueba el backend.</p>';
      }
    }

    function mostrarProducto(p) {
      const variante = p.variantes?.[0] || {};
      const review = p.reviews?.[0] || {};
      const especificaciones = p.especificaciones || {};

      let especsHTML = '';
      if (Object.keys(especificaciones).length > 0) {
        especsHTML = '<ul class="list-disc pl-5 text-sm text-gray-700">';
        for (const [key, value] of Object.entries(especificaciones)) {
          if (typeof value === 'object') {
            especsHTML += `<li><strong>${key}:</strong> ${JSON.stringify(value)}</li>`;
          } else {
            especsHTML += `<li><strong>${key}:</strong> ${value}</li>`;
          }
        }
        especsHTML += '</ul>';
      }

      let variantesHTML = '';
      if (p.variantes && p.variantes.length > 0) {
        variantesHTML = '<div class="space-y-2">';
        p.variantes.forEach((v, i) => {
          variantesHTML += `
            <div class="border p-3 rounded">
              <p class="font-semibold">${v.colorCaja || v.talleAnillo || v.metal || 'Variante ' + (i+1)}</p>
              <p class="text-sm text-gray-600">Stock: ${v.stock} | Precio: $${v.precioVariante.toLocaleString()}</p>
            </div>
          `;
        });
        variantesHTML += '</div>';
      }

      let reviewsHTML = '';
      if (p.reviews && p.reviews.length > 0) {
        reviewsHTML = '<div class="space-y-4">';
        p.reviews.forEach(r => {
          reviewsHTML += `
            <div class="border-l-4 border-yellow-400 p-4 bg-gray-50">
              <div class="flex justify-between mb-2">
                <span class="font-semibold">${r.usuario}</span>
                <span class="text-yellow-500">⭐ ${r.calificacion}/5</span>
              </div>
              <p class="font-medium text-gray-800">${r.titulo}</p>
              <p class="text-sm text-gray-600 mt-2">${r.contenido}</p>
              <p class="text-xs text-gray-400 mt-2">👍 ${r.util || 0} personas encontraron útil</p>
            </div>
          `;
        });
        reviewsHTML += '</div>';
      }

      let disponibilidadHTML = '';
      if (p.disponibilidad) {
        disponibilidadHTML = '<div class="space-y-2 text-sm">';
        for (const [local, info] of Object.entries(p.disponibilidad)) {
          disponibilidadHTML += `
            <div class="p-2 border rounded">
              <p class="font-medium">${local.replace(/_/g, ' ')}</p>
              <p>Stock: ${info.stock || 0}</p>
              ${info.envio_dias ? `<p>Envío: ${info.envio_dias} día(s)</p>` : ''}
            </div>
          `;
        }
        disponibilidadHTML += '</div>';
      }

      let certificacionesHTML = '';
      if (p.certificadosPiedras && p.certificadosPiedras.length > 0) {
        certificacionesHTML = '<div class="space-y-2">';
        p.certificadosPiedras.forEach(c => {
          certificacionesHTML += `
            <div class="p-3 bg-blue-50 border border-blue-200 rounded">
              <p class="font-semibold text-blue-900">Certificado ${c.laboratorio}</p>
              <p class="text-sm">#${c.numeroCertificado}</p>
              <p class="text-xs text-gray-600">Emitido: ${c.fecha}</p>
            </div>
          `;
        });
        certificacionesHTML += '</div>';
      }

      let historialHTML = '';
      if (p.historialPrecios && p.historialPrecios.length > 0) {
        historialHTML = '<div class="space-y-1 text-sm">';
        p.historialPrecios.forEach(h => {
          historialHTML += `<p>📅 ${h.fecha}: $${h.precio.toLocaleString()} <span class="text-gray-500">(${h.razon})</span></p>`;
        });
        historialHTML += '</div>';
      }

      const imagenUrl = variante.imagen || 'https://images.unsplash.com/photo-1617038260897-41a1f14a8ca0?w=600';

      const html = `
        <div>
          <img src="${imagenUrl}" alt="${p.nombre}" class="w-full h-auto rounded shadow-lg">
          <div class="mt-4 space-y-2 text-sm text-gray-600">
            <p>📊 Vistas: ${p.metadata?.vistas || 0}</p>
            <p>🛒 Compras: ${p.metadata?.compras || 0}</p>
            ${p.metadata?.tags ? `<p>🏷️ Tags: ${p.metadata.tags.join(', ')}</p>` : ''}
          </div>
        </div>

        <div>
          <div class="mb-6">
            <p class="text-xs text-gray-400 uppercase">${p.marca}</p>
            <h1 class="text-3xl font-bold mb-2">${p.nombre}</h1>
            <p class="text-2xl font-bold text-gray-900 mb-4">$${p.precioActual.toLocaleString()}</p>
            
            <p class="text-gray-600 mb-6">${p.descripcion || 'Producto de lujo de alta calidad'}</p>

            <div class="flex gap-3 mb-6">
              <button class="flex-1 bg-black text-white px-6 py-3 rounded font-semibold">
                Agregar al Carrito
              </button>
              <button class="flex-1 border-2 border-black px-6 py-3 rounded font-semibold">
                ❤ Favorito
              </button>
            </div>

            <!-- TABS DE INFORMACIÓN -->
            <div class="tabs">
              <button class="tab-btn active" onclick="cambiarTab(event, 'especificaciones')">Especificaciones</button>
              <button class="tab-btn" onclick="cambiarTab(event, 'variantes')">Variantes</button>
              <button class="tab-btn" onclick="cambiarTab(event, 'disponibilidad')">Disponibilidad</button>
              <button class="tab-btn" onclick="cambiarTab(event, 'certificados')">Certificados</button>
              <button class="tab-btn" onclick="cambiarTab(event, 'reviews')">Reseñas</button>
              <button class="tab-btn" onclick="cambiarTab(event, 'historial')">Historial</button>
            </div>

            <!-- ESPECIFICACIONES -->
            <div id="especificaciones" class="tab-content active">
              <h3 class="font-semibold mb-3">Detalles del Producto</h3>
              ${especsHTML || '<p class="text-gray-500">Sin especificaciones disponibles</p>'}
            </div>

            <!-- VARIANTES -->
            <div id="variantes" class="tab-content">
              <h3 class="font-semibold mb-3">Disponibles en ${p.variantes?.length || 0} variante(s)</h3>
              ${variantesHTML || '<p class="text-gray-500">Sin variantes</p>'}
            </div>

            <!-- DISPONIBILIDAD -->
            <div id="disponibilidad" class="tab-content">
              <h3 class="font-semibold mb-3">Stock en Tiendas</h3>
              ${disponibilidadHTML || '<p class="text-gray-500">No hay información de disponibilidad</p>'}
            </div>

            <!-- CERTIFICADOS -->
            <div id="certificados" class="tab-content">
              <h3 class="font-semibold mb-3">Certificaciones</h3>
              ${certificacionesHTML || '<p class="text-gray-500">Sin certificaciones</p>'}
            </div>

            <!-- RESEÑAS -->
            <div id="reviews" class="tab-content">
              <h3 class="font-semibold mb-3">Opiniones de Clientes</h3>
              ${reviewsHTML || '<p class="text-gray-500">Sin reseñas aún</p>'}
            </div>

            <!-- HISTORIAL DE PRECIOS -->
            <div id="historial" class="tab-content">
              <h3 class="font-semibold mb-3">Historial de Precios</h3>
              ${historialHTML || '<p class="text-gray-500">Sin historial</p>'}
            </div>
          </div>
        </div>
      `;

      document.getElementById('detalleProducto').innerHTML = html;
    }

    function cambiarTab(e, tabId) {
      // Ocultar todos
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

      // Mostrar seleccionado
      document.getElementById(tabId).classList.add('active');
      e.target.classList.add('active');
    }

    cargarProducto();
  </script>

</body>
</html>
